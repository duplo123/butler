version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: summer-planner-db
    restart: always
    environment:
      POSTGRES_USER: summer_user
      POSTGRES_PASSWORD: summer_pass
      POSTGRES_DB: summer_planner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U summer_user -d summer_planner"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
